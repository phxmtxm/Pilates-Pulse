<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --whatsapp: #25D366;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
        }

        /* PANTALLA MANTENIMIENTO */
        #maintenance-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 50000; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px;
        }

        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.03; }
            50% { transform: translateY(-100px) translateX(20px); opacity: 0.05; }
            90% { opacity: 0.03; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); }
            100% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: var(--font-main); 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            letter-spacing: -0.02em; 
            position: relative; 
        }

        .bokeh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bokeh {
            position: absolute;
            background: rgba(255, 255, 255, 1);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0;
            animation: bokehFloat infinite linear;
        }

        .logout-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; }

        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 0; position: relative; }
        .logo-pulse-circle { width: 80px; height: 80px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        input, select, textarea { width: 100%; background: #1a1a1c; border: 1px solid var(--border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        
        .btn-principal { background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border); padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; position: relative; z-index: 1; }
        
        .dia-item { background: var(--card); margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--border); overflow: hidden; animation: cardPulse 4s infinite ease-in-out; }
        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .clase-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        .ficha-detalles { display: none; margin-top: 15px; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--border); line-height: 1.6; }

        .crono-header-text { font-family: var(--font-fancy); font-size: 2.2rem; text-align: center; margin-bottom: 30px; color: #fff; }
        .crono-row { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); padding: 20px 0; }
        .crono-dia-label { font-family: var(--font-fancy); font-size: 1.5rem; color: var(--celeste); margin-bottom: 10px; font-style: italic; }
        .crono-task-main { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #fff; }
        .crono-bullet { width: 6px; height: 6px; background: var(--celeste); border-radius: 50%; margin-right: 12px; box-shadow: 0 0 6px var(--celeste); }
        .crono-detail-box { display: none; margin: 10px 0 10px 18px; padding: 15px; background: #1a1a1c; border-radius: 15px; border: 1px solid var(--border); font-size: 0.75rem; color: #aaa; line-height: 1.6; }

        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.5rem; cursor: pointer; backdrop-filter: blur(20px); text-align: center; }
        .nav-btn.active-btn { background: #fff; color: #000; }
        .dot-notif { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; }
        label { display: block; font-size: 0.55rem; color: #888; margin-bottom: 6px; font-weight: 900; text-transform: uppercase; margin-left: 5px; }

        /* PANEL MASTER */
        #master-control-panel { background: #1a0000; border: 2px solid var(--danger); padding: 15px; border-radius: 20px; margin-bottom: 20px; display: none; }
    </style>
</head>
<body>

    <div class="bokeh-container"></div>

    <div id="maintenance-screen">
        <div class="logo-pulse-circle" style="width:100px; height:100px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
        <h1 style="font-family: var(--font-fancy); font-size: 2rem; margin-top:20px;">SITIO EN PAUSA</h1>
        <p style="opacity: 0.5;">Mejoras técnicas en curso.</p>
    </div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="USUARIO">
            <input type="password" id="adminPass" placeholder="CONTRASEÑA">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="logout-container">
            <button class="btn-logout" onclick="handleLogout()">Cerrar Sesión</button>
        </div>

        <div class="main-container">
            <div id="master-control-panel">
                <span style="color:var(--danger); font-weight:900; font-size:0.6rem;">CONTROLES MASTER</span>
                <p id="web-status-txt" style="font-size:0.7rem; margin: 5px 0;">Estado: Cargando...</p>
                <button onclick="toggleMaintenance()" class="btn-principal" style="background:var(--danger); color:white; padding:10px; font-size:0.6rem;">APAGAR / ENCENDER WEB</button>
            </div>

            <div id="modulo-agenda">
                <div id="listaDias"></div>
            </div>

            <div id="modulo-cronograma" style="display:none;">
                <div class="crono-header-text">Cronograma</div>
                <div id="edit-form-crono"></div>
                <div id="render-cronograma"></div>
            </div>

            <div id="modulo-alumnos" style="display:none;">
                <input type="text" id="buscadorAlumnos" placeholder="Buscar alumno..." onkeyup="filtrarAlumnos()">
                <button id="btn-abrir-registro" class="btn-principal" style="margin-bottom:20px; font-size:0.7rem;" onclick="abrirFormNuevoAlumno()">+ REGISTRAR ALUMNO</button>
                <div id="form-alumno-nuevo"></div>
                <div id="render-alumnos"></div>
            </div>

            <div id="modulo-notificaciones" style="display:none;">
                <h3 style="text-align:center; font-size:0.7rem;">PRÓXIMOS VENCIMIENTOS</h3>
                <div id="lista-notificaciones"></div>
            </div>

            <div class="footer-nav">
                <button class="nav-btn active-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">CRONO</button>
                <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">BASE DATOS</button>
                <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">AVISOS <div class="dot-notif" id="active-dot"></div></button>
            </div>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        const MODALIDADES = ["Grupales", "Privadas", "Masajes", "Cumpleaños"];
        const WS_ICON_URL = "https://i.postimg.cc/9M0NRgcD/Whats-App-svg.webp";
        let CACHE_ALUMNOS = [], CACHE_HORARIOS = [], WEB_IS_OFF = false;

        window.onload = async () => {
            initBokeh();
            await checkWebStatus();
            
            const session = localStorage.getItem('studio_auth');
            const isMaster = localStorage.getItem('master_access');

            if (session) {
                if(isMaster === 'true') document.getElementById('master-control-panel').style.display = 'block';
                startApp();
            } else if (WEB_IS_OFF) {
                document.getElementById('maintenance-screen').style.display = 'flex';
            } else {
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        async function checkWebStatus() {
            const { data } = await _sp.from('horarios').select('*').eq('celda_id', 'WEB_STATUS').maybeSingle();
            if (data) {
                WEB_IS_OFF = (data.contenido === 'OFF');
                if(document.getElementById('web-status-txt')) {
                    document.getElementById('web-status-txt').innerText = WEB_IS_OFF ? "Estado: WEB APAGADA" : "Estado: WEB ACTIVA";
                }
            }
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;

            // CONSULTA SEGURA A SUPABASE PARA VERIFICAR USUARIO Y ROL
            const { data, error } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();

            if (data) {
                localStorage.setItem('studio_auth', 'true');
                // Si el rol en Supabase es 'super', activamos privilegios
                if (data.rol === 'super') {
                    localStorage.setItem('master_access', 'true');
                } else {
                    localStorage.setItem('master_access', 'false');
                }
                location.reload();
            } else {
                alert("Credenciales incorrectas");
            }
        }

        async function toggleMaintenance() {
            const nuevo = WEB_IS_OFF ? 'ON' : 'OFF';
            if(confirm(`¿Deseas cambiar la web a modo ${nuevo === 'OFF' ? 'MANTENIMIENTO' : 'ACTIVA'}?`)) {
                await _sp.from('horarios').update({ contenido: nuevo }).eq('celda_id', 'WEB_STATUS');
                location.reload();
            }
        }

        function handleLogout() { localStorage.clear(); location.reload(); }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderEstructura();
            updateAll();
        }

        function renderEstructura() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.75rem;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.5rem; opacity:0.5;">0</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 0 20px 20px 20px;">
                        <div id="clase-form-${d}"></div>
                        <button class="btn-principal" style="font-size:0.55rem; background:#1a1a1c; color:#fff; padding:12px;" onclick="addClasePopup('${d}')">+ CLASE</button>
                        <div id="clases-${d}" style="margin-top:15px;"></div>
                    </div>
                </div>`).join('');
        }

        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            const vis = el.style.display === 'block';
            document.querySelectorAll('.dia-content').forEach(c => c.style.display = 'none');
            el.style.display = vis ? 'none' : 'block';
        }

        function addClasePopup(dia, editId = null, existingData = null) {
            const p = existingData ? existingData.split('|') : ["", "", "", ""];
            const isCrono = document.getElementById('modulo-cronograma').style.display === 'block';
            const target = editId ? (isCrono ? 'edit-form-crono' : `clase-form-${dia}`) : `clase-form-${dia}`;
            document.getElementById(target).innerHTML = `
                <div style="background:#000; padding:15px; border-radius:20px; border:1px solid #222; margin-bottom:15px;">
                    <label>HORA</label><select id="h-${dia}">${generarHoras(p[0])}</select>
                    <label>CLASE</label><select id="t-${dia}">${CLASES.map(c=>`<option ${p[1]==c?'selected':''}>${c}</option>`).join('')}</select>
                    <label>MODALIDAD</label><select id="m-${dia}">${MODALIDADES.map(m=>`<option ${p[2]==m?'selected':''}>${m}</option>`).join('')}</select>
                    <label>ALUMNOS</label><input type="text" id="n-${dia}" value="${p[3]}">
                    <button class="btn-principal" onclick="pushClase('${dia}', '${editId}')">GUARDAR</button>
                    ${editId ? `<button class="btn-cancelar" style="background:var(--danger); color:white;" onclick="borrar('${editId}')">ELIMINAR</button>` : ''}
                    <button class="btn-cancelar" onclick="document.getElementById('${target}').innerHTML=''">CANCELAR</button>
                </div>`;
            if(editId) window.scrollTo({top:0, behavior:'smooth'});
        }

        function generarHoras(sel = "") {
            let r = ""; for(let i=7; i<=21; i++) {
                let h = i > 12 ? i-12 : i; let am = i >= 12 ? "PM" : "AM";
                let t1 = `${h}:00 ${am}`, t2 = `${h}:30 ${am}`;
                r += `<option ${sel==t1?'selected':''}>${t1}</option><option ${sel==t2?'selected':''}>${t2}</option>`;
            } return r;
        }

        async function pushClase(dia, id = "null") {
            const content = `${document.getElementById('h-'+dia).value}|${document.getElementById('t-'+dia).value}|${document.getElementById('m-'+dia).value}|${document.getElementById('n-'+dia).value}`;
            if (id !== "null") await _sp.from('horarios').update({ contenido: content }).eq('id', id);
            else await _sp.from('horarios').insert([{ celda_id: dia, contenido: content }]);
            document.getElementById('edit-form-crono').innerHTML = '';
            document.getElementById(`clase-form-${dia}`).innerHTML = '';
            updateAll();
        }

        async function updateAll() {
            const { data } = await _sp.from('horarios').select('*');
            CACHE_ALUMNOS = data.filter(x => x.celda_id === 'DB_ENTRY');
            CACHE_HORARIOS = data.filter(x => !['DB_ENTRY','WEB_STATUS'].includes(x.celda_id));
            
            DIAS.forEach(d => {
                const f = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = f.length;
                document.getElementById(`clases-${d}`).innerHTML = f.map(i => {
                    const p = i.contenido.split('|');
                    return `<div class="clase-box" style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.75rem;"><b>${p[0]}</b> — ${p[1]}<br>${formatAlumnosAgenda(p[3])}</span>
                        <span onclick="addClasePopup('${d}', '${i.id}', '${i.contenido}')" style="cursor:pointer; opacity:0.5;">📝</span>
                    </div>`;
                }).join('');
            });
            renderAlumnosList(CACHE_ALUMNOS);
            renderCronograma();
            checkVencimientos();
        }

        function formatAlumnosAgenda(txt) {
            if(!txt) return '';
            return txt.split(',').map((n, i) => {
                const name = n.trim();
                const a = CACHE_ALUMNOS.find(x => x.contenido.split('|')[1].toLowerCase() === name.toLowerCase());
                let ws = a ? `<a href="https://wa.me/${a.contenido.split('|')[2].replace(/\s+/g,'')}" target="_blank"><img src="${WS_ICON_URL}" class="ws-agenda-icon"></a>` : '';
                return `<div style="font-size:0.65rem; margin-top:4px;">${i+1}-${name} ${ws}</div>`;
            }).join('');
        }

        function renderCronograma() {
            document.getElementById('render-cronograma').innerHTML = DIAS.map(d => {
                const cls = CACHE_HORARIOS.filter(x => x.celda_id === d);
                return `<div class="crono-row"><div class="crono-dia-label">${d}</div>
                    ${cls.map(c => {
                        const p = c.contenido.split('|');
                        return `<div class="crono-task"><div class="crono-task-main" onclick="toggleCDetail('${c.id}')">
                            <div style="display:flex; align-items:center;"><div class="crono-bullet"></div><b>${p[0]}</b> &nbsp; — &nbsp; ${p[1]}</div>
                            <span class="crono-edit-icon" onclick="event.stopPropagation(); addClasePopup('${d}','${c.id}','${c.contenido}')">📝</span>
                        </div><div id="cd-${c.id}" class="crono-detail-box"><b>ALUMNOS:</b><br>${p[3]}</div></div>`;
                    }).join('')}</div>`;
            }).join('');
        }

        function toggleCDetail(id) { const el = document.getElementById(`cd-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }

        function renderAlumnosList(l) {
            document.getElementById('render-alumnos').innerHTML = l.map(a => {
                const p = a.contenido.split('|');
                return `<div class="clase-box"><b>${p[1]}</b><br><small>${p[2]}</small>
                    <div id="ex-${a.id}" class="ficha-detalles"><p>VENCE: ${p[10]}</p>
                    <button class="btn-principal" style="padding:10px; font-size:0.5rem;" onclick="abrirFormNuevoAlumno('${a.id}','${a.contenido}')">EDITAR</button></div>
                    <div style="margin-top:10px; display:flex; gap:10px;"><button class="nav-btn" style="padding:8px;" onclick="tEx('${a.id}')">DETALLES</button>
                    <button style="color:red; background:none; border:none;" onclick="borrar('${a.id}')">BORRAR</button></div></div>`;
            }).join('');
        }

        function tEx(id) { const el = document.getElementById(`ex-${id}`); el.style.display = el.style.display === 'block' ? 'none' : 'block'; }

        function abrirFormNuevoAlumno(id = null, data = null) {
            const p = data ? data.split('|') : Array(12).fill('');
            document.getElementById('btn-abrir-registro').style.display = 'none';
            document.getElementById('form-alumno-nuevo').innerHTML = `
                <div style="background:#111; padding:20px; border-radius:25px; border:1px solid #333;">
                    <label>Nombre</label><input type="text" id="db-nom" value="${p[1]}">
                    <label>Teléfono</label><input type="text" id="db-tel" value="${p[2]}">
                    <label>Vencimiento</label><input type="date" id="db-vence" value="${p[10]}">
                    <button class="btn-principal" onclick="saveA('${id}')">GUARDAR</button>
                    <button class="btn-cancelar" onclick="location.reload()">CANCELAR</button>
                </div>`;
        }

        async function saveA(id) {
            const c = `DB|${document.getElementById('db-nom').value}|${document.getElementById('db-tel').value}||||||||${document.getElementById('db-vence').value}|`;
            if(id !== "null") await _sp.from('horarios').update({ contenido: c }).eq('id', id);
            else await _sp.from('horarios').insert([{ celda_id: 'DB_ENTRY', contenido: c }]);
            location.reload();
        }

        function checkVencimientos() {
            const hoy = new Date();
            const vencidos = CACHE_ALUMNOS.filter(a => {
                const f = a.contenido.split('|')[10];
                if(!f) return false;
                const dv = new Date(f + "T23:59:59");
                return (dv - hoy) / (1000 * 60 * 60) <= 48;
            });
            document.getElementById('active-dot').style.display = vencidos.length ? 'block' : 'none';
            document.getElementById('lista-notificaciones').innerHTML = vencidos.map(v => `<div class="clase-box"><b>${v.contenido.split('|')[1]}</b> - Vence: ${v.contenido.split('|')[10]}</div>`).join('');
        }

        function filtrarAlumnos() {
            const q = document.getElementById('buscadorAlumnos').value.toLowerCase();
            renderAlumnosList(CACHE_ALUMNOS.filter(a => a.contenido.split('|')[1].toLowerCase().includes(q)));
        }

        function switchModulo(id) {
            ['modulo-agenda','modulo-cronograma','modulo-alumnos','modulo-notificaciones'].forEach(m => document.getElementById(m).style.display = m === id ? 'block' : 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active-btn', b.id === 'btn-' + id.split('-')[1]));
        }

        async function borrar(id) { if(confirm("¿Eliminar?")) { await _sp.from('horarios').delete().eq('id', id); updateAll(); } }
        function initBokeh() { const c = document.querySelector('.bokeh-container'); for(let i=0; i<15; i++) { const b=document.createElement('div'); b.className='bokeh'; b.style.width=b.style.height=Math.random()*100+50+'px'; b.style.left=Math.random()*100+'%'; b.style.top=Math.random()*100+'%'; b.style.animationDuration=Math.random()*10+10+'s'; c.appendChild(b); } }
    </script>
