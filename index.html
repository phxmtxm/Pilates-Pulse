<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --success: #25D366;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
        }

        /* Animaciones */
        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.05; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }

        @keyframes clickPulse {
            0% { transform: scale(1); }
            50% { transform: scale(0.85); }
            100% { transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: var(--font-main); 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            letter-spacing: -0.02em; 
        }

        /* Estética de Fondo */
        .bokeh-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
        .bokeh { position: absolute; background: #fff; border-radius: 50%; filter: blur(30px); opacity: 0; animation: bokehFloat infinite linear; }

        /* Login & Logout */
        .logout-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 0; }
        .logo-pulse-circle { width: 80px; height: 80px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; transition: transform 0.5s ease; }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        /* Inputs y Botones Generales */
        input, select { width: 100%; background: #1a1a1c; border: 1px solid var(--border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit; transition: border 0.3s; }
        input:focus { border-color: rgba(255,255,255,0.3); }
        
        .btn-principal { 
            background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; 
            font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px;
            transition: transform 0.2s;
        }
        .btn-principal:active { transform: scale(0.98); }

        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border); padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; }
        
        /* Listado de Clases */
        .dia-item { background: var(--card); margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--border); overflow: hidden; }
        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .clase-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 12px; border: 1px solid var(--border); animation: slideUp 0.4s ease; }

        /* --- BOTONES DE ASISTENCIA (MINIMAL + ANIMADOS) --- */
        .check-btn {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1.5px solid rgba(255,255,255,0.1);
            margin-right: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 8px;
            font-weight: 900;
            transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
            flex-shrink: 0;
            background: rgba(255,255,255,0.05);
            color: transparent;
        }

        .check-btn:active { animation: clickPulse 0.3s ease; }

        .check-btn.presente { 
            background: var(--success); 
            border-color: var(--success); 
            color: #000; 
            box-shadow: 0 0 10px rgba(37, 211, 102, 0.3);
        }

        .check-btn.ausente { 
            background: var(--danger); 
            border-color: var(--danger); 
            color: #fff; 
            box-shadow: 0 0 10px rgba(255, 45, 85, 0.3);
        }

        /* Otros Elementos */
        .ws-agenda-icon { width: 14px; height: 14px; margin-left: 8px; vertical-align: middle; cursor: pointer; opacity: 0.5; transition: opacity 0.3s; }
        .ws-agenda-icon:hover { opacity: 1; }

        /* Navegación Inferior */
        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.5rem; cursor: pointer; backdrop-filter: blur(20px); text-align: center; }
        .nav-btn.active-btn { background: #fff; color: #000; }
    </style>
</head>
<body>

    <div class="bokeh-container"></div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="ADMIN ID">
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="logout-container">
            <button class="btn-logout" onclick="handleLogout()">Salir</button>
        </div>

        <div class="branding-container" id="main-brand" onclick="location.reload()" style="cursor:pointer">
            <div class="logo-pulse-circle" style="width: 50px; height: 50px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text" style="font-size: 0.7rem; letter-spacing: 3px;">PILATES PULSE</div>
        </div>

        <div class="main-container">
            <div id="modulo-agenda">
                <div id="listaDias"></div>
            </div>

            <div class="footer-nav">
                <button class="nav-btn active-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono">CRONO</button>
                <button class="nav-btn" id="btn-db">ALUMNOS</button>
                <button class="nav-btn" id="btn-notif">NOTIF.</button>
            </div>
        </div>
    </div>

    <script>
        // Configuración Supabase
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        let CACHE_HORARIOS = [];

        window.onload = () => {
            initBokeh();
            if (localStorage.getItem('studio_auth')) startApp();
            else document.getElementById('login-section').style.display = 'flex';
        };

        function initBokeh() {
            const container = document.querySelector('.bokeh-container');
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'bokeh';
                const s = Math.random() * 150 + 50;
                b.style.width = b.style.height = `${s}px`;
                b.style.left = `${Math.random() * 100}%`;
                b.style.top = `${Math.random() * 100}%`;
                b.style.animationDuration = `${Math.random() * 20 + 10}s`;
                container.appendChild(b);
            }
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) { localStorage.setItem('studio_auth', 'true'); startApp(); } 
            else alert("Acceso Incorrecto");
        }

        function handleLogout() { localStorage.removeItem('studio_auth'); location.reload(); }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderDias();
            updateAgenda();
        }

        function renderDias() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.75rem; letter-spacing:1px;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.55rem; opacity:0.4;">0 Clases</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 0 20px 20px 20px;">
                        <div id="clases-${d}"></div>
                    </div>
                </div>`).join('');
        }

        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.dia-content').forEach(c => c.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        async function updateAgenda() {
            const { data } = await _sp.from('horarios').select('*');
            CACHE_HORARIOS = data;

            DIAS.forEach(d => {
                const clasesDia = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = `${clasesDia.length} Clases`;
                
                document.getElementById(`clases-${d}`).innerHTML = clasesDia.map(clase => {
                    const p = clase.contenido.split('|');
                    const alumnos = p[3] ? p[3].split(',') : [];
                    const asistencia = p[4] ? p[4].split(',') : [];

                    const listaAlumnosHtml = alumnos.map((nom, idx) => {
                        const status = asistencia[idx] || '0';
                        let btnClass = status === '1' ? 'presente' : (status === '2' ? 'ausente' : '');
                        let icon = status === '1' ? '✓' : (status === '2' ? '×' : '');

                        return `
                            <div style="display:flex; align-items:center; margin-bottom:10px;">
                                <div class="check-btn ${btnClass}" onclick="toggleAsis('${clase.id}', ${idx})">${icon}</div>
                                <span style="font-size:0.7rem; opacity:0.8;">${nom.trim()}</span>
                            </div>`;
                    }).join('');

                    return `
                        <div class="clase-box">
                            <div style="font-weight:900; font-size:0.8rem; margin-bottom:10px;">
                                <span style="color:var(--celeste);">${p[0]}</span> — ${p[1]}
                            </div>
                            ${listaAlumnosHtml}
                        </div>`;
                }).join('');
            });
        }

        async function toggleAsis(id, idx) {
            const clase = CACHE_HORARIOS.find(x => x.id == id);
            let p = clase.contenido.split('|');
            let asisArr = p[4] ? p[4].split(',') : new Array(p[3].split(',').length).fill('0');
            
            // Ciclo: 0 (nada) -> 1 (presente) -> 2 (ausente) -> 0
            asisArr[idx] = (parseInt(asisArr[idx]) + 1) % 3;
            p[4] = asisArr.join(',');
            
            await _sp.from('horarios').update({ contenido: p.join('|') }).eq('id', id);
            updateAgenda();
        }

        function switchModulo(id) {
            // Lógica simple para navegación (puedes expandirla)
            console.log("Cambiando a:", id);
        }
    </script>
</body>
</html>
