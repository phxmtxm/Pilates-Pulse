<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505;
            --card: #121214;
            --accent: #ffffff;
            --celeste: #a2d2ff;
            --danger: #ff2d55;
            --success: #25D366;
            --whatsapp: #25D366;
            --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif;
            --font-fancy: 'Playfair Display', serif;
        }

        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            10% { opacity: 0.03; }
            50% { transform: translateY(-100px) translateX(20px); opacity: 0.05; }
            90% { opacity: 0.03; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }

        @keyframes cardPulse {
            0% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
            50% { box-shadow: 0 0 15px rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); }
            100% { box-shadow: 0 0 5px rgba(255,255,255,0.01); border-color: rgba(255,255,255,0.08); }
        }

        @keyframes shimmer {
            0% { transform: translateX(-150%) skewX(-25deg); }
            100% { transform: translateX(150%) skewX(-25deg); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { 
            font-family: var(--font-main); 
            margin: 0; 
            background: var(--bg); 
            color: #fff; 
            overflow-x: hidden; 
            letter-spacing: -0.02em; 
            position: relative; 
        }

        .bokeh-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }

        .bokeh {
            position: absolute;
            background: rgba(255, 255, 255, 1);
            border-radius: 50%;
            filter: blur(30px);
            opacity: 0;
            animation: bokehFloat infinite linear;
        }

        .logout-container { position: absolute; top: 20px; right: 20px; z-index: 1000; }
        .btn-logout { background: transparent; border: 1px solid var(--border); color: #888; padding: 8px 12px; border-radius: 12px; font-size: 0.55rem; font-weight: 900; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: all 0.3s; }
        .btn-logout:active { background: var(--danger); color: white; border-color: var(--danger); }

        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        .branding-container { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px 0; position: relative; }
        .logo-pulse-circle { width: 80px; height: 80px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; transition: transform 0.5s ease; }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        .search-container { margin-bottom: 20px; position: relative; }
        .search-input { background: #1a1a1c; border: 1px solid var(--border); padding: 15px 20px 15px 45px; border-radius: 20px; color: #fff; width: 100%; transition: all 0.3s; }
        .search-input:focus { border-color: rgba(255,255,255,0.3); background: #202022; }
        .search-icon { position: absolute; left: 18px; top: 16px; opacity: 0.3; }

        input, select, textarea { width: 100%; background: #1a1a1c; border: 1px solid var(--border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        
        .btn-principal { 
            background: #fff; 
            color: #000; 
            border: none; 
            padding: 20px; 
            border-radius: 20px; 
            font-weight: 900; 
            width: 100%; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            position: relative; 
            overflow: hidden; 
        }

        .btn-principal::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            animation: shimmer 2s infinite;
            animation-delay: 1s;
        }

        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border); padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; position: relative; z-index: 1; }
        
        .dia-item { 
            background: var(--card); 
            margin-bottom: 15px; 
            border-radius: 30px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            animation: cardPulse 4s infinite ease-in-out; 
        }
        .dia-item:hover { border-color: rgba(255,255,255,0.2); transform: translateY(-2px); transition: all 0.3s; }

        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        
        .clase-box { 
            background: rgba(255,255,255,0.03); 
            padding: 20px; 
            border-radius: 25px; 
            margin-bottom: 12px; 
            border: 1px solid var(--border); 
            position: relative; 
            animation: cardPulse 5s infinite ease-in-out; 
            animation-delay: 1s;
        }

        .ficha-detalles { display: none; margin-top: 15px; padding: 20px; background: rgba(0,0,0,0.6); border-radius: 20px; font-size: 0.8rem; border: 1px solid var(--border); line-height: 1.6; }

        .vence-alerta { color: var(--danger) !important; text-shadow: 0 0 10px rgba(255, 45, 85, 0.3); }

        /* Control de Asistencia */
        .check-btn {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.2);
            margin-right: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 10px;
            font-weight: 900;
            transition: all 0.3s;
        }
        .check-btn.presente { background: var(--success); border-color: var(--success); color: #000; }
        .check-btn.ausente { background: var(--danger); border-color: var(--danger); color: #fff; }

        .ws-agenda-icon {
            width: 16px;
            height: 16px;
            margin-left: 6px;
            vertical-align: text-bottom;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .ws-agenda-icon:active { transform: scale(1.2); }

        .crono-header-text { font-family: var(--font-fancy); font-size: 2.2rem; text-align: center; margin-bottom: 30px; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .crono-row { display: flex; flex-direction: column; border-bottom: 1px solid var(--border); padding: 20px 0; }
        .crono-dia-label { font-family: var(--font-fancy); font-size: 1.5rem; color: var(--celeste); margin-bottom: 10px; font-style: italic; }
        .crono-list { list-style: none; padding: 0; margin: 0; }
        .crono-task { padding: 10px 0; border-radius: 10px; transition: background 0.3s; }
        .crono-task:hover { background: rgba(255,255,255,0.02); }
        .crono-task-main { display: flex; align-items: center; justify-content: space-between; font-size: 0.8rem; color: #fff; font-family: var(--font-main); }
        .crono-bullet { width: 6px; height: 6px; background: var(--celeste); border-radius: 50%; margin-right: 12px; box-shadow: 0 0 6px var(--celeste); }
        .crono-edit-icon { cursor: pointer; font-size: 1rem; padding: 5px; opacity: 0.7; transition: all 0.3s; }
        .crono-edit-icon:hover { opacity: 1; transform: scale(1.2) rotate(-10deg); }
        .crono-detail-box { display: none; margin: 10px 0 10px 18px; padding: 15px; background: #1a1a1c; border-radius: 15px; border: 1px solid var(--border); font-size: 0.75rem; color: #aaa; line-height: 1.6; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.5rem; cursor: pointer; backdrop-filter: blur(20px); position: relative; text-align: center; transition: all 0.3s; }
        .nav-btn.active-btn { background: #fff; color: #000; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        .dot-notif { position: absolute; top: 5px; right: 5px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; display: none; box-shadow: 0 0 10px var(--danger); }
        label { display: block; font-size: 0.55rem; color: #888; margin-bottom: 6px; font-weight: 900; text-transform: uppercase; margin-left: 5px; }
    </style>
</head>
<body>

    <div class="bokeh-container"></div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="ADMIN ID">
            <input type="password" id="adminPass" placeholder="PASSWORD">
            <button onclick="handleLogin()" class="btn-principal">ACCEDER</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="logout-container">
            <button class="btn-logout" onclick="handleLogout()">Cerrar Sesión</button>
        </div>

        <div class="branding-container" id="main-brand" onclick="location.reload()" style="cursor:pointer">
            <div class="logo-pulse-circle" style="width: 60px; height: 60px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text" style="font-size: 0.8rem;">PILATES PULSE</div>
        </div>

        <div class="main-container">
            <div id="modulo-agenda">
                <div id="listaDias"></div>
            </div>

            <div id="modulo-cronograma" style="display:none;">
                <div class="branding-container" style="padding-top: 0;">
                    <div class="logo-pulse-circle" style="width: 50px; height: 50px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
                </div>
                <div class="crono-header-text">Cronograma</div>
                <div id="edit-form-crono" style="margin-bottom: 20px;"></div>
                <div id="render-cronograma"></div>
            </div>

            <div id="modulo-notificaciones" style="display:none;">
                <h3 style="font-size:0.7rem; color:#fff; letter-spacing:2px; text-align:center; margin-bottom:20px;">PRÓXIMOS VENCIMIENTOS</h3>
                <div id="lista-notificaciones"></div>
            </div>

            <div id="modulo-alumnos" style="display:none;">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="buscadorAlumnos" class="search-input" placeholder="Buscar alumno..." onkeyup="filtrarAlumnos()">
                </div>
                <button id="btn-abrir-registro" class="btn-principal" style="margin-bottom:20px; font-size:0.7rem;" onclick="abrirFormNuevoAlumno()">+ REGISTRAR ALUMNO</button>
                <div id="form-alumno-nuevo"></div>
                <div id="render-alumnos"></div>
            </div>

            <div class="footer-nav">
                <button class="nav-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">CRONO</button>
                <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">BASE DATOS</button>
                <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">
                    NOTIF. <div class="dot-notif" id="active-dot"></div>
                </button>
            </div>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        const CLASES = ["Align Flow", "Power Flow", "Stretch&Release", "Aerial Balance", "Mega Core", "Life Align"];
        const MODALIDADES = ["Grupales", "Privadas", "Masajes", "Cumpleaños"];
        const FRECUENCIAS = ["1/semana", "2/semana", "3/semana"];
        const WS_ICON_URL = "https://i.postimg.cc/HWQkv6Qv/whatsapp-vector-logo-icono-logotipo-vector-redes-sociales-901408-406.avif";
        let CACHE_ALUMNOS = [];
        let CACHE_HORARIOS = [];

        window.onload = () => {
            initBokeh();
            if (localStorage.getItem('studio_auth')) startApp();
            else document.getElementById('login-section').style.display = 'flex';
        };

        function initBokeh() {
            const container = document.querySelector('.bokeh-container');
            const count = 15;
            for (let i = 0; i < count; i++) {
                const bokeh = document.createElement('div');
                bokeh.className = 'bokeh';
                const size = Math.random() * 150 + 50;
                bokeh.style.width = `${size}px`;
                bokeh.style.height = `${size}px`;
                bokeh.style.left = `${Math.random() * 100}%`;
                bokeh.style.top = `${Math.random() * 100 + 10}%`;
                const duration = Math.random() * 20 + 15;
                bokeh.style.animationDuration = `${duration}s`;
                bokeh.style.animationDelay = `${Math.random() * 10}s`;
                container.appendChild(bokeh);
            }
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) { 
                localStorage.setItem('studio_auth', 'true'); 
                startApp(); 
            } else alert("Acceso denegado");
        }

        function handleLogout() {
            localStorage.removeItem('studio_auth');
            location.reload();
        }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderEstructura();
            updateAll();
        }

        function renderEstructura() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header" onclick="toggleDia('${d}')">
                        <span style="font-weight:900; font-size:0.75rem; letter-spacing:1px;">${d.toUpperCase()}</span>
                        <span id="badge-${d}" style="font-size:0.5rem; opacity:0.5; font-weight:800; background:rgba(255,255,255,0.1); padding:4px 8px; border-radius:8px;">0</span>
                    </div>
                    <div class="dia-content" id="cont-${d}" style="display:none; padding: 0 20px 20px 20px;">
                        <div id="clase-form-${d}"></div>
                        <button class="btn-principal" id="btn-add-${d}" style="font-size:0.55rem; background:#1a1a1c; color:#fff; padding:12px; letter-spacing:1px;" onclick="addClasePopup('${d}')">+ CLASE</button>
                        <div id="clases-${d}" style="margin-top:15px;"></div>
                    </div>
                </div>`).join('');
        }

        function toggleDia(d) {
            const el = document.getElementById(`cont-${d}`);
            const vis = el.style.display === 'block';
            document.querySelectorAll('.dia-content').forEach(c => c.style.display = 'none');
            el.style.display = vis ? 'none' : 'block';
        }

        function addClasePopup(dia, editId = null, existingData = null) {
            const p = existingData ? existingData.split('|') : ["", "", "", "", ""];
            const isCrono = document.getElementById('modulo-cronograma').style.display === 'block';
            const targetDiv = editId ? (isCrono ? 'edit-form-crono' : `clase-form-${dia}`) : `clase-form-${dia}`;
            
            document.getElementById(targetDiv).innerHTML = `
                <div style="background:#000; padding:15px; border-radius:20px; margin-bottom:15px; border:1px solid #222; animation: fadeIn 0.3s ease;">
                    <label>HORA</label><select id="h-${dia}">${generarHoras(p[0])}</select>
                    <label>TIPO DE CLASE</label><select id="t-${dia}">${CLASES.map(c=>`<option ${p[1]==c?'selected':''}>${c}</option>`).join('')}</select>
                    <label>MODALIDAD</label><select id="m-${dia}">${MODALIDADES.map(m=>`<option ${p[2]==m?'selected':''}>${m}</option>`).join('')}</select>
                    <label>ALUMNO(S) - (Separar por coma)</label><input type="text" id="n-${dia}" value="${p[3]}">
                    <button class="btn-principal" style="padding:12px; font-size:0.6rem; letter-spacing:1px;" onclick="pushClase('${dia}', '${editId}', '${p[4] || ''}')">GUARDAR</button>
                    ${editId ? `<button class="btn-cancelar" style="background:var(--danger); color:white; padding:10px; font-size:0.5rem; border:none;" onclick="borrar('${editId}')">ELIMINAR</button>` : ''}
                    <button class="btn-cancelar" style="padding:10px; font-size:0.5rem;" onclick="document.getElementById('${targetDiv}').innerHTML=''">CANCELAR</button>
                </div>`;
            
            if(editId) window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function generarHoras(selected = "") {
            let res = ""; for(let i=7; i<=21; i++) {
                let h = i > 12 ? i-12 : i; let ampm = i >= 12 ? "PM" : "AM";
                let t1 = `${h}:00 ${ampm}`, t2 = `${h}:30 ${ampm}`;
                res += `<option ${selected==t1?'selected':''}>${t1}</option><option ${selected==t2?'selected':''}>${t2}</option>`;
            } return res;
        }

        // --- ASISTENCIA LOGIC ---
        async function toggleAsistencia(claseId, alumnoIdx) {
            const clase = CACHE_HORARIOS.find(c => c.id == claseId);
            if(!clase) return;
            let parts = clase.contenido.split('|');
            let asistenciaArr = parts[4] ? parts[4].split(',') : new Array(parts[3].split(',').length).fill('0');
            
            // Ciclo: 0 (pendiente) -> 1 (presente) -> 2 (ausente) -> 0
            let current = parseInt(asistenciaArr[alumnoIdx] || '0');
            asistenciaArr[alumnoIdx] = (current + 1) % 3;
            
            parts[4] = asistenciaArr.join(',');
            await _sp.from('horarios').update({ contenido: parts.join('|') }).eq('id', claseId);
            updateAll();
        }

        function formatAlumnosAgenda(texto, claseId, asistenciaStr) {
            if(!texto) return '';
            const alumnosArray = texto.split(',');
            const asistenciaArray = asistenciaStr ? asistenciaStr.split(',') : [];
            
            return alumnosArray.map((nombreRaw, i) => {
                const nombreLimpio = nombreRaw.trim();
                const estado = asistenciaArray[i] || '0'; // 0=pend, 1=pres, 2=aus
                const alumnoDB = CACHE_ALUMNOS.find(a => a.contenido.split('|')[1].toLowerCase() === nombreLimpio.toLowerCase());
                
                let linkWs = '';
                if (alumnoDB) {
                    const telLimpio = alumnoDB.contenido.split('|')[2].replace(/\s+/g, '');
                    linkWs = `<a href="https://wa.me/${telLimpio}" target="_blank"><img src="${WS_ICON_URL}" class="ws-agenda-icon"></a>`;
                }

                let checkClass = estado == '1' ? 'presente' : (estado == '2' ? 'ausente' : '');
                let checkIcon = estado == '1' ? '✓' : (estado == '2' ? '×' : '');

                return `<div style="margin-bottom:8px; display:flex; align-items:center; font-size:0.7rem;">
                            <div class="check-btn ${checkClass}" onclick="toggleAsistencia('${claseId}', ${i})">${checkIcon}</div>
                            <span>${i+1}-${nombreLimpio}</span>
                            ${linkWs}
                        </div>`;
            }).join('');
        }

        function a24h(horaStr) {
            if (!horaStr) return 0;
            let [tiempo, ampm] = horaStr.split(' ');
            let [hh, mm] = tiempo.split(':');
            hh = parseInt(hh);
            mm = parseInt(mm);
            if (ampm === "PM" && hh < 12) hh += 12;
            if (ampm === "AM" && hh === 12) hh = 0;
            return hh * 60 + mm;
        }

        async function pushClase(dia, editId = "null", asistenciaActual = "") {
            const h = document.getElementById('h-'+dia).value;
            const t = document.getElementById('t-'+dia).value;
            const m = document.getElementById('m-'+dia).value;
            const n = document.getElementById('n-'+dia).value;
            const content = `${h}|${t}|${m}|${n}|${asistenciaActual}`;
            
            if (editId !== "null") {
                await _sp.from('horarios').update({ contenido: content }).eq('id', editId);
            } else {
                await _sp.from('horarios').insert([{ celda_id: dia, contenido: content }]);
            }
            document.getElementById('edit-form-crono').innerHTML = '';
            document.getElementById(`clase-form-${dia}`).innerHTML = '';
            updateAll();
        }

        async function updateAll() {
            const { data } = await _sp.from('horarios').select('*');
            CACHE_ALUMNOS = data.filter(x => x.celda_id === 'DB_ENTRY');
            CACHE_HORARIOS = data.filter(x => x.celda_id !== 'DB_ENTRY').sort((a, b) => {
                return a24h(a.contenido.split('|')[0]) - a24h(b.contenido.split('|')[0]);
            });
            
            DIAS.forEach(d => {
                const filtrados = CACHE_HORARIOS.filter(x => x.celda_id === d);
                document.getElementById(`badge-${d}`).innerText = filtrados.length;
                document.getElementById(`clases-${d}`).innerHTML = filtrados.map(i => {
                    const p = i.contenido.split('|');
                    return `<div class="clase-box" style="display:flex; justify-content:space-between; align-items:center;">
                        <span style="font-size:0.75rem; line-height: 1.4;"><b>${p[0]}</b> — ${p[1]}<br><small style="opacity:0.6;">${p[2]}</small><br><div style="margin-top:10px;">${formatAlumnosAgenda(p[3], i.id, p[4])}</div></span>
                        <div style="display:flex; gap:10px; align-items:center;">
                            <span onclick="addClasePopup('${d}', '${i.id}', '${i.contenido}')" style="cursor:pointer; font-size:0.8rem; opacity:0.5;">📝</span>
                            <span onclick="borrar('${i.id}')" style="opacity:0.1; cursor:pointer; font-weight:900;">×</span>
                        </div>
                    </div>`;
                }).join('');
            });
            renderAlumnosList(CACHE_ALUMNOS);
            processVencimientos();
            renderCronograma();
        }

        function renderCronograma() {
            const container = document.getElementById('render-cronograma');
            container.innerHTML = DIAS.map(dia => {
                const clasesDelDia = CACHE_HORARIOS.filter(x => x.celda_id === dia);
                return `
                    <div class="crono-row">
                        <div class="crono-dia-label">${dia}</div>
                        <div class="crono-list">
                            ${clasesDelDia.length > 0 ? clasesDelDia.map(c => {
                                const p = c.contenido.split('|');
                                const asisArr = p[4] ? p[4].split(',') : [];
                                const countPresentes = asisArr.filter(x => x=='1').length;
                                return `
                                <div class="crono-task">
                                    <div class="crono-task-main">
                                        <div style="display:flex; align-items:center; cursor:pointer;" onclick="toggleCronoDetail('${c.id}')">
                                            <div class="crono-bullet" style="background:${countPresentes > 0 ? 'var(--success)' : 'var(--celeste)'}"></div> 
                                            <b>${p[0]}</b> &nbsp; — &nbsp; ${p[1]} 
                                            <small style="margin-left:10px; opacity:0.5">(${countPresentes}/${p[3].split(',').length})</small>
                                        </div>
                                        <span class="crono-edit-icon" onclick="addClasePopup('${dia}', '${c.id}', '${c.contenido}')">📝</span>
                                    </div>
                                    <div id="crono-detail-${c.id}" class="crono-detail-box">
                                        <div style="color:#fff;">${formatAlumnosAgenda(p[3], c.id, p[4])}</div>
                                    </div>
                                </div>`;
                            }).join('') : '<div style="opacity:0.2; font-size:0.7rem; margin-left:18px;">Sin clases</div>'}
                        </div>
                    </div>`;
            }).join('');
        }

        function toggleCronoDetail(id) {
            const el = document.getElementById(`crono-detail-${id}`);
            const isVisible = el.style.display === 'block';
            document.querySelectorAll('.crono-detail-box').forEach(box => box.style.display = 'none');
            el.style.display = isVisible ? 'none' : 'block';
        }

        function checkVencimiento(fechaStr) {
            if (!fechaStr) return false;
            const hoy = new Date();
            const venc = new Date(fechaStr + "T23:59:59");
            const diff = (venc - hoy) / (1000 * 60 * 60); 
            return diff <= 48;
        }

        function renderAlumnosList(lista) {
            document.getElementById('render-alumnos').innerHTML = lista.map(a => {
                const p = a.contenido.split('|');
                const estaVencido = checkVencimiento(p[10]);
                const telLimpio = p[2].replace(/\s+/g, '');
                
                return `<div class="clase-box">
                    <b style="font-size:0.85rem;" class="${estaVencido ? 'vence-alerta' : ''}">${p[1] || 'SIN NOMBRE'}</b>
                    <br>
                    <a href="https://wa.me/${telLimpio}" target="_blank" class="ws-wrapper">
                        <img src="${WS_ICON_URL}" class="ws-icon">
                        <span class="ws-number">${p[2]}</span>
                    </a>
                    <br>
                    <small style="opacity:0.5;">${p[3]} — ${p[4]}</small>
                    <div id="extra-${a.id}" class="ficha-detalles">
                        <p><b>EDAD:</b> ${p[11]} años</p>
                        <p><b>MODALIDAD:</b> ${p[5]}</p>
                        <p><b>VENCIMIENTO:</b> <span class="${estaVencido ? 'vence-alerta' : ''}">${p[10] || 'N/A'}</span></p>
                        <hr style="opacity:0.1; margin:10px 0;">
                        <p><b>SALUD:</b> ${p[6] || 'Ninguna'}</p>
                    </div>
                    <div style="margin-top:15px; display:flex; gap:10px; justify-content:space-between; align-items:center;">
                        <button class="nav-btn" style="padding:10px 20px; font-size:0.5rem; background:#1a1a1c; border-color:#333;" onclick="toggleExtra('${a.id}')">DETALLES</button>
                        <button style="background:transparent; border:none; color:var(--danger); font-size:0.55rem; font-weight:900;" onclick="borrar('${a.id}')">BORRAR</button>
                    </div>
                </div>`;
            }).join('');
        }

        function processVencimientos() {
            const listaNotif = document.getElementById('lista-notificaciones');
            let alertas = CACHE_ALUMNOS.filter(a => checkVencimiento(a.contenido.split('|')[10]));
            document.getElementById('active-dot').style.display = alertas.length > 0 ? 'block' : 'none';
            if (alertas.length === 0) {
                listaNotif.innerHTML = `<p style="text-align:center; opacity:0.3; font-size:0.7rem; margin-top:30px;">No hay vencimientos próximos.</p>`;
            } else {
                listaNotif.innerHTML = alertas.map(a => {
                    const p = a.contenido.split('|');
                    return `<div class="clase-box" style="border-left: 4px solid var(--danger);">
                        <b style="color:var(--danger)">${p[1]}</b><br>
                        <small>Vence: <b>${p[10]}</b></small>
                    </div>`;
                }).join('');
            }
        }

        function filtrarAlumnos() {
            const q = document.getElementById('buscadorAlumnos').value.toLowerCase();
            const f = CACHE_ALUMNOS.filter(a => a.contenido.split('|')[1].toLowerCase().includes(q));
            renderAlumnosList(f);
        }

        function toggleExtra(id) {
            const el = document.getElementById(`extra-${id}`);
            el.style.display = el.style.display === 'block' ? 'none' : 'block';
        }

        function abrirFormNuevoAlumno(editId = null, existingData = null) {
            const p = existingData ? existingData.split('|') : Array(12).fill('');
            let edades = ""; for(let i=1; i<=100; i++) edades += `<option value="${i}">${i}</option>`;
            document.getElementById('btn-abrir-registro').style.display = 'none';
            document.getElementById('form-alumno-nuevo').innerHTML = `
                <div style="background:#111; padding:20px; border-radius:30px; border:1px solid #222; margin-bottom:20px;">
                    <label>Nombre</label><input type="text" id="db-nom" value="${p[1]}">
                    <label>Edad</label><select id="db-edad">${edades}</select>
                    <label>Teléfono</label><input type="text" id="db-tel" value="${p[2]}">
                    <label>Clase</label><select id="db-clase">${CLASES.map(c=>`<option ${p[3]==c?'selected':''}>${c}</option>`).join('')}</select>
                    <label>Frecuencia</label><select id="db-frec">${FRECUENCIAS.map(f=>`<option ${p[4]==f?'selected':''}>${f}</option>`).join('')}</select>
                    <label>Modalidad</label><select id="db-mod">${MODALIDADES.map(m=>`<option ${p[5]==m?'selected':''}>${m}</option>`).join('')}</select>
                    <label>Vencimiento</label><input type="date" id="db-vence" value="${p[10]}">
                    <label>Salud</label><textarea id="db-salud" rows="2">${p[6]}</textarea>
                    <button class="btn-principal" onclick="saveAlumno('${editId}')">GUARDAR</button>
                    <button class="btn-cancelar" onclick="cerrarFormAlumno()">CANCELAR</button>
                </div>`;
            if(editId) document.getElementById('db-edad').value = p[11];
        }

        async function saveAlumno(editId = "null") {
            const d = (id) => document.getElementById(id).value;
            const content = `DB|${d('db-nom')}|${d('db-tel')}|${d('db-clase')}|${d('db-frec')}|${d('db-mod')}|${d('db-salud')}||||${d('db-vence')}|${d('db-edad')}`;
            if(editId !== "null") await _sp.from('horarios').update({ contenido: content }).eq('id', editId);
            else await _sp.from('horarios').insert([{ celda_id: 'DB_ENTRY', contenido: content }]);
            cerrarFormAlumno(); 
            updateAll();
        }

        function cerrarFormAlumno() { 
            document.getElementById('form-alumno-nuevo').innerHTML = ''; 
            document.getElementById('btn-abrir-registro').style.display = 'block';
        }
        
        function switchModulo(id) {
            document.getElementById('modulo-agenda').style.display = id === 'modulo-agenda' ? 'block' : 'none';
            document.getElementById('modulo-cronograma').style.display = id === 'modulo-cronograma' ? 'block' : 'none';
            document.getElementById('modulo-alumnos').style.display = id === 'modulo-alumnos' ? 'block' : 'none';
            document.getElementById('modulo-notificaciones').style.display = id === 'modulo-notificaciones' ? 'block' : 'none';
            document.getElementById('main-brand').style.display = id === 'modulo-cronograma' ? 'none' : 'flex';
            document.getElementById('btn-agenda').classList.toggle('active-btn', id === 'modulo-agenda');
            document.getElementById('btn-crono').classList.toggle('active-btn', id === 'modulo-cronograma');
            document.getElementById('btn-db').classList.toggle('active-btn', id === 'modulo-alumnos');
            document.getElementById('btn-notif').classList.toggle('active-btn', id === 'modulo-notificaciones');
        }

        async function borrar(id) { 
            if(confirm("¿Borrar definitivamente?")) { 
                await _sp.from('horarios').delete().eq('id', id); 
                updateAll(); 
            } 
        }
    </script>
</body>
</html>
