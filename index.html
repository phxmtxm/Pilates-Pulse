<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pilates Pulse | Luxury Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Xqs2VjT0/image.png">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;900&family=Playfair+Display:italic,wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg: #050505; --card: #121214; --accent: #ffffff; --celeste: #a2d2ff;
            --danger: #ff2d55; --whatsapp: #25D366; --border: rgba(255, 255, 255, 0.08);
            --font-main: 'Montserrat', sans-serif; --font-fancy: 'Playfair Display', serif;
        }

        /* Animaciones */
        @keyframes bokehFloat {
            0% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { opacity: 0.05; }
            100% { transform: translateY(-200px) translateX(-20px); opacity: 0; }
        }
        @keyframes cardPulse {
            0%, 100% { border-color: rgba(255,255,255,0.08); }
            50% { border-color: rgba(255,255,255,0.2); }
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { font-family: var(--font-main); margin: 0; background: var(--bg); color: #fff; overflow-x: hidden; }

        .bokeh-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; overflow: hidden; }
        .bokeh { position: absolute; background: #fff; border-radius: 50%; filter: blur(30px); opacity: 0; animation: bokehFloat infinite linear; }

        /* Pantallas Especiales */
        #maintenance-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 30000; display: none;
            flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 40px;
        }

        #login-section {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg); z-index: 10000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* UI Elements */
        .branding-container { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; }
        .logo-pulse-circle { width: 80px; height: 80px; background: #fff; border-radius: 50%; overflow: hidden; border: 3px solid #1a1a1c; }
        .logo-pulse-circle img { width: 100%; height: 100%; object-fit: cover; }
        .brand-text { font-weight: 900; letter-spacing: 5px; margin-top: 15px; font-size: 1rem; text-transform: uppercase; }

        input, select, textarea { width: 100%; background: #1a1a1c; border: 1px solid var(--border); padding: 18px; border-radius: 20px; color: #fff; margin-bottom: 15px; font-family: inherit; }
        .btn-principal { background: #fff; color: #000; border: none; padding: 20px; border-radius: 20px; font-weight: 900; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; }
        .btn-cancelar { background: #1a1a1c; color: #777; border: 1px solid var(--border); padding: 15px; border-radius: 20px; width: 100%; cursor: pointer; margin-top: 10px; font-weight: 800; }
        
        .main-container { padding: 20px; max-width: 500px; margin: 0 auto; padding-bottom: 150px; }
        
        /* Modulos */
        .dia-item { background: var(--card); margin-bottom: 15px; border-radius: 30px; border: 1px solid var(--border); overflow: hidden; animation: cardPulse 4s infinite; }
        .dia-header { padding: 25px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .clase-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }

        .footer-nav { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 95%; max-width: 500px; z-index: 999; }
        .nav-btn { background: rgba(15, 15, 15, 0.85); color: #fff; padding: 12px 2px; border-radius: 15px; border: 1px solid var(--border); font-weight: 800; font-size: 0.55rem; cursor: pointer; backdrop-filter: blur(20px); text-align: center; }
        .nav-btn.active-btn { background: #fff; color: #000; }

        /* Panel Maestro */
        #master-panel {
            background: #1a0000; border: 2px solid var(--danger); padding: 20px; border-radius: 25px; margin-bottom: 30px; display: none;
        }
    </style>
</head>
<body>

    <div class="bokeh-container" id="bokeh"></div>

    <div id="maintenance-screen">
        <div class="logo-pulse-circle" style="width:100px; height:100px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
        <h1 style="font-family: var(--font-fancy); font-size: 2rem;">SITIO EN PAUSA</h1>
        <p style="opacity: 0.5;">Estamos realizando ajustes técnicos.<br>Volvemos en unos minutos.</p>
    </div>

    <div id="login-section">
        <div class="branding-container">
            <div class="logo-pulse-circle"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            <div class="brand-text">PILATES PULSE</div>
        </div>
        <div style="width: 90%; max-width: 380px;">
            <input type="text" id="adminUser" placeholder="USUARIO">
            <input type="password" id="adminPass" placeholder="CONTRASEÑA">
            <button onclick="handleLogin()" class="btn-principal">ENTRAR</button>
        </div>
    </div>

    <div id="app-content" style="display:none;">
        <div class="main-container">
            
            <div id="master-panel">
                <h3 style="color:var(--danger); font-size: 0.7rem; margin-top:0;">MODO SUPER-ADMIN</h3>
                <p id="status-text" style="font-size: 0.8rem;">Estado: Cargando...</p>
                <button onclick="toggleWeb()" class="btn-principal" style="background:var(--danger); color:white; padding:10px; font-size:0.6rem;">
                    APAGAR / ENCENDER WEB
                </button>
            </div>

            <div class="branding-container">
                <div class="logo-pulse-circle" style="width:60px; height:60px;"><img src="https://i.postimg.cc/Xqs2VjT0/image.png"></div>
            </div>

            <div id="modulo-agenda">
                <div id="listaDias"></div>
            </div>

            <div id="modulo-cronograma" style="display:none;"></div>
            <div id="modulo-alumnos" style="display:none;"></div>
            <div id="modulo-notificaciones" style="display:none;"></div>

            <div class="footer-nav">
                <button class="nav-btn active-btn" id="btn-agenda" onclick="switchModulo('modulo-agenda')">AGENDA</button>
                <button class="nav-btn" id="btn-crono" onclick="switchModulo('modulo-cronograma')">CRONO</button>
                <button class="nav-btn" id="btn-db" onclick="switchModulo('modulo-alumnos')">BASE DATOS</button>
                <button class="nav-btn" id="btn-notif" onclick="switchModulo('modulo-notificaciones')">AVISOS</button>
            </div>
            
            <button class="btn-cancelar" onclick="logout()" style="margin-top:40px; border:none; background:transparent; font-size:0.6rem;">CERRAR SESIÓN</button>
        </div>
    </div>

    <script>
        const _sp = supabase.createClient("https://iodtfnclwwgcczxgbmbq.supabase.co", "sb_publishable_uOUPFEp0T_uX85fjqi9xog_6WUS6dKg");
        const DIAS = ["Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
        let WEB_OFF = false;

        window.onload = async () => {
            initBokeh();
            await checkStatus();
            
            const auth = localStorage.getItem('studio_auth');
            const isMaster = localStorage.getItem('master_access');

            if (auth) {
                if(isMaster === 'true') document.getElementById('master-panel').style.display = 'block';
                startApp();
            } else if (WEB_OFF) {
                document.getElementById('maintenance-screen').style.display = 'flex';
            } else {
                document.getElementById('login-section').style.display = 'flex';
            }
        };

        async function checkStatus() {
            const { data } = await _sp.from('horarios').select('*').eq('celda_id', 'WEB_STATUS').maybeSingle();
            if (data) {
                WEB_OFF = (data.contenido === 'OFF');
                const st = document.getElementById('status-text');
                if(st) st.innerText = WEB_OFF ? "ESTADO: WEB APAGADA" : "ESTADO: WEB ACTIVA";
            }
        }

        async function handleLogin() {
            const u = document.getElementById('adminUser').value;
            const p = document.getElementById('adminPass').value;

            // LOGIN MAESTRO (Tú)
            if (u === "admin" && p === "m_xmA92X_12[2+XA-!") {
                localStorage.setItem('studio_auth', 'true');
                localStorage.setItem('master_access', 'true');
                location.reload();
                return;
            }

            // LOGIN NORMAL
            const { data } = await _sp.from('usuarios_admin').select('*').eq('usuario', u).eq('password', p).maybeSingle();
            if (data) {
                localStorage.setItem('studio_auth', 'true');
                localStorage.setItem('master_access', 'false');
                location.reload();
            } else {
                alert("Acceso denegado");
            }
        }

        async function toggleWeb() {
            const nuevo = WEB_OFF ? 'ON' : 'OFF';
            if(confirm(`¿Cambiar estado de la web a ${nuevo}?`)) {
                await _sp.from('horarios').update({ contenido: nuevo }).eq('celda_id', 'WEB_STATUS');
                location.reload();
            }
        }

        function startApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-content').style.display = 'block';
            renderAgenda();
            // Aquí irían tus funciones updateAll() originales
        }

        function renderAgenda() {
            document.getElementById('listaDias').innerHTML = DIAS.map(d => `
                <div class="dia-item">
                    <div class="dia-header">
                        <span style="font-weight:900; font-size:0.75rem;">${d.toUpperCase()}</span>
                        <span style="font-size:0.5rem; opacity:0.5;">CLASES ACTIVAS</span>
                    </div>
                </div>`).join('');
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        function initBokeh() {
            const container = document.getElementById('bokeh');
            for (let i = 0; i < 15; i++) {
                const b = document.createElement('div');
                b.className = 'bokeh';
                b.style.width = b.style.height = (Math.random() * 100 + 50) + 'px';
                b.style.left = Math.random() * 100 + '%';
                b.style.top = Math.random() * 100 + '%';
                b.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(b);
            }
        }

        // Lógica de navegación simple para el ejemplo
        function switchModulo(id) {
            document.querySelectorAll('.main-container > div:not(#master-panel):not(.branding-container)').forEach(m => m.style.display = 'none');
            document.getElementById(id).style.display = 'block';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active-btn'));
            document.getElementById('btn-' + id.split('-')[1]).classList.add('active-btn');
        }
    </script>
</body>
</html>
